<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>espacio</title>
  <style>
    :root {
      --ink: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    #scene { width: 100%; height: 100%; display: block; touch-action: none; }

    /* HUD mínimo: una sola línea de estado, abajo a la izquierda */
    #hud {
      position: fixed;
      left: 16px; bottom: 14px;
      color: var(--ink);
      font-size: 11px;
      letter-spacing: 0.08em;
      user-select: none;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hud.faded { opacity: 0.25; }

    /* Buscador: una línea casi invisible, centrada abajo. No parece UI:
       parece una rendija por donde se puede hablar al espacio. */
    #search {
      position: fixed;
      left: 50%; bottom: 34px;
      transform: translateX(-50%);
      width: min(440px, 76vw);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180, 170, 200, 0.15);
      color: #cfc7dd;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 6px 4px;
      outline: none;
      transition: border-color 0.6s ease, opacity 0.6s ease;
      opacity: 0.4;
    }
    #search:focus {
      border-bottom-color: rgba(180, 170, 200, 0.45);
      opacity: 1;
    }
    #search::placeholder { color: rgba(180, 170, 200, 0.3); }

    @media (prefers-reduced-motion: reduce) {
      #hud { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <input id="search" type="text" autocomplete="off" spellcheck="false"
         placeholder="" aria-label="invocar" />
  <div id="hud">cargando</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
