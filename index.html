<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>espacio</title>
  <style>
    :root {
      --ink: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    #scene { width: 100%; height: 100%; display: block; touch-action: none; }

    /* HUD mínimo: una sola línea de estado, abajo a la izquierda */
    #hud {
      position: fixed;
      left: 16px; bottom: 14px;
      color: var(--ink);
      font-size: 11px;
      letter-spacing: 0.08em;
      user-select: none;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hud.faded { opacity: 0.25; }

    /* Buscador: una línea casi invisible, centrada abajo. No parece UI:
       parece una rendija por donde se puede hablar al espacio. */
    #controls {
      position: fixed;
      left: 50%; bottom: 34px;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      width: min(500px, 82vw);
    }
    #search {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180, 170, 200, 0.28);
      color: #cfc7dd;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 8px 4px;
      outline: none;
      transition: border-color 0.6s ease, opacity 0.6s ease;
      opacity: 0.6;
    }
    #search:hover { opacity: 0.85; }
    #search:focus { border-bottom-color: rgba(180, 170, 200, 0.55); opacity: 1; }
    #search::placeholder { color: rgba(180, 170, 200, 0.5); letter-spacing: 0.14em; }
    #random {
      background: transparent;
      border: 1px solid rgba(180, 170, 200, 0.22);
      border-radius: 2px;
      color: #cfc7dd;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px; letter-spacing: 0.08em;
      padding: 7px 12px; cursor: pointer; opacity: 0.55;
      transition: opacity 0.4s ease, border-color 0.4s ease;
    }
    #random:hover { opacity: 1; border-color: rgba(180, 170, 200, 0.5); }

    /* Círculo difuminado de carga: anticipa la aparición de los modelos. */
    #loader {
      position: fixed;
      left: 50%; top: 50%;
      width: 90px; height: 90px; margin: -45px 0 0 -45px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(180,170,200,0.28) 0%, rgba(180,170,200,0.10) 40%, rgba(180,170,200,0) 70%);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      animation: loaderPulse 2.2s ease-in-out infinite;
    }
    #loader.on { opacity: 1; }
    @keyframes loaderPulse {
      0%,100% { transform: scale(0.9); }
      50% { transform: scale(1.12); }
    }

    @media (prefers-reduced-motion: reduce) {
      #hud { transition: none; }
      #loader { animation: none; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="loader" aria-hidden="true"></div>
  <div id="controls">
    <input id="search" type="text" autocomplete="off" spellcheck="false"
           placeholder="escribe para invocar…" aria-label="invocar" />
    <button id="random" title="aleatorio">azar</button>
  </div>
  <div id="hud">cargando</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
